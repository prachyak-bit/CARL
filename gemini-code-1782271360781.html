<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดเวรเช้าประจำเดือน - คณะพยาบาลศาสตร์</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Prompt', 'sans-serif'],
                    },
                    colors: {
                        nu: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6', // สีม่วงหลักของธีม
                            900: '#4c1d95',
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ซ่อนส่วนที่ไม่ต้องการเวลาพิมพ์ (Print) */
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background-color: white !important;
            }
            .print-full-width {
                width: 100% !important;
                max-width: 100% !important;
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
            }
            .print-table {
                border-collapse: collapse !important;
            }
            .print-table th, .print-table td {
                border: 1px solid #ddd !important;
            }
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <header class="bg-nu-800 text-white shadow-md no-print">
        <div class="container mx-auto px-4 py-4 flex items-center gap-4">
            <div class="bg-white text-nu-800 p-2 rounded-full h-12 w-12 flex items-center justify-center text-xl shadow-sm">
                <i class="fa-solid fa-hospital-user"></i>
            </div>
            <div>
                <h1 class="text-xl md:text-2xl font-bold">ระบบจัดเวรเช้าประจำเดือน</h1>
                <p class="text-nu-100 text-sm md:text-base">คณะพยาบาลศาสตร์</p>
            </div>
        </div>
    </header>

    <main class="flex-1 container mx-auto px-4 py-6 flex flex-col lg:flex-row gap-6">
        
        <aside class="w-full lg:w-1/3 bg-white rounded-xl shadow-sm border border-gray-100 p-5 space-y-6 no-print h-fit">
            <h2 class="text-lg font-semibold text-nu-800 border-b pb-2"><i class="fa-solid fa-sliders mr-2"></i>ตั้งค่าการจัดเวร</h2>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">1. รายชื่อบุคลากร (คั่นด้วยจุลภาค ,)</label>
                <textarea id="personnelInput" rows="3" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-nu-500 focus:border-nu-500 outline-none transition" placeholder="เช่น สมชาย, สมหญิง, นพ.สมศักดิ์"></textarea>
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">2. เดือน</label>
                    <select id="monthSelect" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-nu-500 focus:border-nu-500 outline-none transition"></select>
                </div>
                <div class="w-1/2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">ปี ค.ศ.</label>
                    <select id="yearSelect" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-nu-500 focus:border-nu-500 outline-none transition"></select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">3. รูปแบบการจัดเวร</label>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="algorithm" value="sequential" checked class="text-nu-600 focus:ring-nu-500 w-4 h-4">
                        <span class="text-sm">เรียงตามรายชื่อ</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="algorithm" value="random" class="text-nu-600 focus:ring-nu-500 w-4 h-4">
                        <span class="text-sm">สุ่มรายชื่อ (Random)</span>
                    </label>
                </div>
            </div>

            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <label class="block text-sm font-medium text-gray-700 mb-2">4. ตั้งค่าวันหยุด / วันยกเว้น</label>
                <label class="flex items-center gap-2 cursor-pointer mb-3">
                    <input type="checkbox" id="skipWeekends" checked class="text-nu-600 rounded focus:ring-nu-500 w-4 h-4">
                    <span class="text-sm text-gray-700">เว้นวันหยุดเสาร์-อาทิตย์</span>
                </label>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">วันที่ต้องการยกเว้นเพิ่มเติม (คั่นด้วยจุลภาค เช่น 13,14,15)</label>
                    <input type="text" id="extraHolidays" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-nu-500 outline-none text-sm" placeholder="ระบุวันที่...">
                </div>
            </div>

            <div class="bg-nu-50 p-4 rounded-lg border border-nu-100">
                <label class="block text-sm font-medium text-nu-800 mb-2">5. เงื่อนไขรายบุคคล (ไม่สะดวกขึ้นเวร)</label>
                <div class="space-y-2 mb-3">
                    <select id="constraintName" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-nu-500 outline-none">
                        <option value="">-- เลือกชื่อบุคลากร --</option>
                    </select>
                    <div class="flex gap-2">
                        <select id="constraintType" class="w-1/2 border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-nu-500 outline-none" onchange="toggleConstraintInput()">
                            <option value="dayOfWeek">วันในสัปดาห์</option>
                            <option value="specificDate">วันที่เฉพาะเจาะจง</option>
                        </select>
                        <div id="constraintValueContainer" class="w-1/2">
                            </div>
                    </div>
                    <button type="button" onclick="addConstraint()" class="w-full bg-white border border-nu-500 text-nu-700 hover:bg-nu-500 hover:text-white transition rounded-lg p-2 text-sm font-medium">
                        <i class="fa-solid fa-plus mr-1"></i> เพิ่มเงื่อนไข
                    </button>
                </div>
                
                <ul id="constraintList" class="space-y-2 max-h-32 overflow-y-auto"></ul>
            </div>

            <div class="flex gap-3 pt-2">
                <button onclick="generateSchedule()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg shadow-md transition transform active:scale-95">
                    <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>ประมวลผลจัดเวร
                </button>
                <button onclick="clearData()" class="px-4 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-3 rounded-lg transition transform active:scale-95">
                    ล้างข้อมูล
                </button>
            </div>
        </aside>

        <section class="w-full lg:w-2/3 bg-white rounded-xl shadow-sm border border-gray-100 p-5 md:p-8 print-full-width">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b pb-4">
                <div>
                    <h2 class="text-xl font-bold text-gray-800">ตารางเวรเช้า</h2>
                    <p id="tableSubtitle" class="text-gray-500 mt-1">กรุณากดปุ่ม "ประมวลผลจัดเวร" เพื่อดูผลลัพธ์</p>
                </div>
                <button onclick="window.print()" class="no-print mt-4 sm:mt-0 bg-nu-100 hover:bg-nu-200 text-nu-800 px-4 py-2 rounded-lg font-medium transition flex items-center">
                    <i class="fa-solid fa-print mr-2"></i> พิมพ์รายงาน
                </button>
            </div>

            <div class="overflow-x-auto rounded-lg border border-gray-200">
                <table class="w-full text-left print-table">
                    <thead class="bg-nu-100 text-nu-800">
                        <tr>
                            <th class="px-4 py-3 font-semibold w-20 text-center">วันที่</th>
                            <th class="px-4 py-3 font-semibold w-32 text-center">วัน</th>
                            <th class="px-4 py-3 font-semibold">ชื่อผู้เข้าเวร</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleTableBody" class="divide-y divide-gray-200">
                        <tr>
                            <td colspan="3" class="px-4 py-8 text-center text-gray-400">
                                <i class="fa-regular fa-calendar-xmark text-4xl mb-3 block"></i>
                                ยังไม่มีข้อมูลตารางเวร
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <footer class="bg-nu-900 text-white text-center p-4 mt-auto no-print">
        <p class="text-sm font-light">
            พัฒนาโดย <span class="font-medium">นายปรัชญา คำเส็ง</span> ตำแหน่ง นักวิชาการคอมพิวเตอร์
        </p>
    </footer>

    <script>
        // ข้อมูลพื้นฐาน
        const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        const thaiDays = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];
        
        let individualConstraints = []; // { name, type, value, label }

        // เริ่มต้นการทำงานเมื่อโหลดหน้าเว็บ
        document.addEventListener('DOMContentLoaded', () => {
            initDateSelects();
            toggleConstraintInput();
            
            // อัปเดต Dropdown ชื่อเมื่อพิมพ์รายชื่อเสร็จ (เมื่อคลิกออกหรือพิมพ์จุลภาค)
            document.getElementById('personnelInput').addEventListener('blur', updateConstraintNameSelect);
            document.getElementById('personnelInput').addEventListener('keyup', (e) => {
                if(e.key === ',') updateConstraintNameSelect();
            });
        });

        // 1. กำหนดค่าเริ่มต้นให้ Dropdown เดือนและปี
        function initDateSelects() {
            const monthSelect = document.getElementById('monthSelect');
            const yearSelect = document.getElementById('yearSelect');
            const currentDate = new Date();

            // เดือน
            thaiMonths.forEach((m, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.text = m;
                if (index === currentDate.getMonth()) option.selected = true;
                monthSelect.appendChild(option);
            });

            // ปี (ล่วงหน้า/ย้อนหลัง 2 ปี)
            const currentYear = currentDate.getFullYear();
            for (let i = currentYear - 2; i <= currentYear + 2; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.text = i;
                if (i === currentYear) option.selected = true;
                yearSelect.appendChild(option);
            }
        }

        // 2. ดึงรายชื่อจาก Textarea ให้เป็น Array
        function getPersonnelArray() {
            const input = document.getElementById('personnelInput').value;
            if (!input.trim()) return [];
            return input.split(',')
                .map(name => name.trim())
                .filter(name => name.length > 0);
        }

        // 3. ระบบจัดการเงื่อนไข (Constraints)
        function updateConstraintNameSelect() {
            const names = getPersonnelArray();
            const select = document.getElementById('constraintName');
            const currentValue = select.value;
            
            select.innerHTML = '<option value="">-- เลือกชื่อบุคลากร --</option>';
            names.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.text = name;
                select.appendChild(option);
            });
            if (names.includes(currentValue)) select.value = currentValue;
        }

        function toggleConstraintInput() {
            const type = document.getElementById('constraintType').value;
            const container = document.getElementById('constraintValueContainer');
            
            if (type === 'dayOfWeek') {
                let html = `<select id="constraintValue" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-nu-500 outline-none">`;
                thaiDays.forEach((day, index) => {
                    html += `<option value="${index}">ทุกวัน${day}</option>`;
                });
                html += `</select>`;
                container.innerHTML = html;
            } else {
                container.innerHTML = `<input type="number" id="constraintValue" min="1" max="31" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-nu-500 outline-none" placeholder="วันที่ (1-31)">`;
            }
        }

        function addConstraint() {
            const name = document.getElementById('constraintName').value;
            const type = document.getElementById('constraintType').value;
            const valueInput = document.getElementById('constraintValue');
            const value = valueInput.value;

            if (!name) return alert("กรุณาเลือกชื่อบุคลากร");
            if (!value) return alert("กรุณาระบุค่าเงื่อนไข");

            let label = "";
            if (type === 'dayOfWeek') {
                label = `ไม่สะดวกวัน${thaiDays[parseInt(value)]}`;
            } else {
                label = `ไม่สะดวกวันที่ ${value}`;
            }

            // ตรวจสอบว่าซ้ำหรือไม่
            const isDuplicate = individualConstraints.some(c => c.name === name && c.type === type && c.value === value);
            if (isDuplicate) return alert("เงื่อนไขนี้ถูกเพิ่มไปแล้ว");

            individualConstraints.push({ name, type, value: parseInt(value), label });
            renderConstraintList();
        }

        function removeConstraint(index) {
            individualConstraints.splice(index, 1);
            renderConstraintList();
        }

        function renderConstraintList() {
            const list = document.getElementById('constraintList');
            list.innerHTML = '';
            individualConstraints.forEach((c, index) => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center bg-white p-2 rounded border border-gray-200 text-sm";
                li.innerHTML = `
                    <span class="text-gray-700 truncate"><span class="font-semibold text-nu-700">${c.name}</span>: ${c.label}</span>
                    <button onclick="removeConstraint(${index})" class="text-red-500 hover:text-red-700 ml-2" title="ลบ"><i class="fa-solid fa-xmark"></i></button>
                `;
                list.appendChild(li);
            });
        }

        // 4. Utility: สุ่ม Array (Fisher-Yates Shuffle)
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        // 5. อัลกอริทึม จัดตารางเวร (Core Logic)
        function generateSchedule() {
            const names = getPersonnelArray();
            if (names.length === 0) {
                alert("กรุณาระบุรายชื่อบุคลากรก่อนทำการประมวลผล");
                document.getElementById('personnelInput').focus();
                return;
            }

            const month = parseInt(document.getElementById('monthSelect').value);
            const year = parseInt(document.getElementById('yearSelect').value);
            const algorithm = document.querySelector('input[name="algorithm"]:checked').value;
            const skipWeekends = document.getElementById('skipWeekends').checked;
            
            // ประมวลผลวันหยุดเพิ่มเติม
            const extraHolidaysStr = document.getElementById('extraHolidays').value;
            const extraHolidays = extraHolidaysStr.split(',').map(d => parseInt(d.trim())).filter(d => !isNaN(d));

            // หาจำนวนวันในเดือน
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const schedule = [];

            // ตัวแปรสำหรับอัลกอริทึม
            let seqIndex = 0;
            let randomPool = shuffleArray([...names]);

            for (let date = 1; date <= daysInMonth; date++) {
                const currentDate = new Date(year, month, date);
                const dayOfWeek = currentDate.getDay(); // 0 = อาทิตย์, 6 = เสาร์

                // 1. ตรวจสอบวันหยุดภาพรวม
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const isExtraHoliday = extraHolidays.includes(date);

                if ((skipWeekends && isWeekend) || isExtraHoliday) {
                    schedule.push({ date, dayOfWeek, person: "วันหยุด", isHoliday: true });
                    continue;
                }

                // 2. หาคนลงเวร
                let assignedPerson = null;
                let attempts = 0;

                while (!assignedPerson && attempts < names.length) {
                    let candidate = "";

                    if (algorithm === 'sequential') {
                        candidate = names[seqIndex % names.length];
                    } else { // random
                        if (randomPool.length === 0) {
                            randomPool = shuffleArray([...names]); // เติม pool ใหม่
                        }
                        candidate = randomPool[0]; // หยิบคนแรกใน pool
                    }

                    // ตรวจสอบเงื่อนไขรายบุคคล
                    const hasConstraint = individualConstraints.some(c => {
                        if (c.name !== candidate) return false;
                        if (c.type === 'dayOfWeek' && c.value === dayOfWeek) return true;
                        if (c.type === 'specificDate' && c.value === date) return true;
                        return false;
                    });

                    if (!hasConstraint) {
                        assignedPerson = candidate;
                        if (algorithm === 'sequential') {
                            seqIndex++;
                        } else {
                            randomPool.shift(); // เอาคนที่ได้เวรแล้วออกจาก pool ย่อย
                        }
                    } else {
                        // ถ้าติดเงื่อนไข ข้ามไปคนถัดไป
                        if (algorithm === 'sequential') {
                            seqIndex++;
                        } else {
                            // ย้ายคนที่ติดเงื่อนไขไปไว้ท้าย pool เพื่อลองในวันอื่น และลองคนถัดไป
                            const skipped = randomPool.shift();
                            randomPool.push(skipped);
                        }
                        attempts++;
                    }
                }

                // กรณีที่ทุกคนในรายชื่อติดเงื่อนไขในวันนี้หมดเลย
                if (!assignedPerson) {
                    assignedPerson = "ไม่มีผู้เข้าเวร (ติดเงื่อนไข)";
                }

                schedule.push({ date, dayOfWeek, person: assignedPerson, isHoliday: false });
            }

            renderTable(schedule, month, year);
        }

        // 6. แสดงผลตาราง (Render Table)
        function renderTable(schedule, month, year) {
            const tbody = document.getElementById('scheduleTableBody');
            const subtitle = document.getElementById('tableSubtitle');
            
            subtitle.innerText = `ประจำเดือน ${thaiMonths[month]} ปี ค.ศ. ${year}`;
            tbody.innerHTML = '';

            schedule.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-nu-50 transition duration-150 ease-in-out";

                // จัดสไตล์สำหรับวันหยุด
                if (row.isHoliday) {
                    tr.classList.add('bg-gray-100', 'text-gray-500');
                    tr.classList.remove('hover:bg-nu-50');
                } else if (row.dayOfWeek === 0 || row.dayOfWeek === 6) {
                    // ไฮไลต์สีเสาร์-อาทิตย์อ่อนๆ ถ้าไม่ได้ตั้งเป็นวันหยุด
                    tr.classList.add('bg-red-50');
                }

                const tdDate = document.createElement('td');
                tdDate.className = "px-4 py-3 text-center border-t border-gray-100";
                tdDate.innerText = row.date;

                const tdDay = document.createElement('td');
                tdDay.className = "px-4 py-3 text-center border-t border-gray-100";
                tdDay.innerText = thaiDays[row.dayOfWeek];

                const tdPerson = document.createElement('td');
                tdPerson.className = `px-4 py-3 border-t border-gray-100 ${row.isHoliday ? 'italic' : 'font-medium text-nu-900'}`;
                
                // ตกแต่งกรณีไม่มีผู้เข้าเวร
                if (row.person.includes('ไม่มีผู้เข้าเวร')) {
                    tdPerson.innerHTML = `<span class="text-red-500 bg-red-100 px-2 py-1 rounded text-sm">${row.person}</span>`;
                } else {
                    tdPerson.innerText = row.person;
                }

                tr.appendChild(tdDate);
                tr.appendChild(tdDay);
                tr.appendChild(tdPerson);
                tbody.appendChild(tr);
            });
        }

        // 7. ล้างข้อมูล (Clear Data)
        function clearData() {
            if(confirm("คุณต้องการล้างข้อมูลการตั้งค่าทั้งหมดใช่หรือไม่?")) {
                document.getElementById('personnelInput').value = '';
                document.getElementById('extraHolidays').value = '';
                document.getElementById('skipWeekends').checked = true;
                document.querySelector('input[value="sequential"]').checked = true;
                
                individualConstraints = [];
                renderConstraintList();
                updateConstraintNameSelect();
                
                const currentDate = new Date();
                document.getElementById('monthSelect').value = currentDate.getMonth();
                document.getElementById('yearSelect').value = currentDate.getFullYear();
                
                document.getElementById('scheduleTableBody').innerHTML = `
                    <tr>
                        <td colspan="3" class="px-4 py-8 text-center text-gray-400">
